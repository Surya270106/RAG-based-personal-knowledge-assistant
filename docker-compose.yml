version: "3.9"

services:
  backend:
    build: ./backend
    container_name: docmind-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - backend-uploads:/app/uploads
      - backend-vectorstore:/app/vectorstore
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: docmind-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-uploads:
  backend-vectorstore:
